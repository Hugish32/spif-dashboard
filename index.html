<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.spif-wrap { font-family: 'DM Sans', sans-serif; background: #F4F2EE; padding: 24px 20px; border-radius: 12px; }
.spif-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; }
.spif-header h2 { font-size: 20px; font-weight: 600; color: #1A1A1A; letter-spacing: -0.3px; margin: 0; }
.spif-meta { font-size: 12px; color: #6B6860; font-family: 'DM Mono', monospace; }
.spif-pbadge { display: inline-block; background: #1A1A1A; color: white; font-size: 11px; font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
.spif-sbadge { display: inline-block; background: #E2DFD8; color: #6B6860; font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 7px; border-radius: 4px; margin-left: 4px; vertical-align: middle; }
.spif-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.spif-card { background: #FFFFFF; border-radius: 16px; padding: 20px 16px 16px; display: flex; flex-direction: column; align-items: center; border: 1px solid #E2DFD8; position: relative; overflow: hidden; }
.spif-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--spif-accent); }
.spif-card-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #6B6860; margin-bottom: 16px; text-align: center; min-height: 28px; display: flex; align-items: center; justify-content: center; }
.spif-thermo-outer { position: relative; width: 64px; height: 200px; margin-bottom: 16px; }
.spif-thermo-tube { position: absolute; left: 50%; transform: translateX(-50%); width: 22px; bottom: 14px; height: 166px; background: #EEEBE6; border-radius: 11px 11px 0 0; overflow: hidden; }
.spif-thermo-fill { position: absolute; bottom: 0; left: 0; right: 0; background: var(--spif-accent); transition: height 1.2s cubic-bezier(.4,0,.2,1); }
.spif-target-line { position: absolute; left: 50%; transform: translateX(-50%); width: 36px; height: 2px; z-index: 3; }
.spif-target-inner { width: 100%; height: 2px; background: var(--spif-accent); opacity: 0.55; border-radius: 1px; }
.spif-target-lbl { position: absolute; right: -38px; top: -5px; font-size: 9px; color: var(--spif-accent); opacity: 0.8; font-family: 'DM Mono', monospace; white-space: nowrap; }
.spif-bulb { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; border-radius: 50%; background: var(--spif-accent); z-index: 2; }
.spif-pct-big { font-size: 30px; font-weight: 600; color: #1A1A1A; letter-spacing: -1px; line-height: 1; margin-bottom: 4px; }
.spif-pct-big span { font-size: 16px; font-weight: 400; color: #6B6860; }
.spif-caisses-reel { font-family: 'DM Mono', monospace; font-size: 13px; color: #1A1A1A; font-weight: 500; margin-bottom: 2px; }
.spif-caisses-obj { font-size: 11px; color: #6B6860; margin-bottom: 12px; }
.spif-divider { width: 100%; height: 1px; background: #E2DFD8; margin-bottom: 10px; }
.spif-row { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.spif-lbl { font-size: 10px; color: #6B6860; text-transform: uppercase; letter-spacing: 0.06em; }
.spif-val { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }
.spif-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.spif-ahead   { background: #E1F5EE; color: #0F6E56; }
.spif-ontrack { background: #E6F1FB; color: #185FA5; }
.spif-watch   { background: #FAEEDA; color: #854F0B; }
.spif-behind  { background: #FAECE7; color: #993C1D; }
.spif-footer  { text-align: center; font-size: 11px; color: #6B6860; margin-top: 20px; font-family: 'DM Mono', monospace; }
.spif-tick { position: absolute; left: 4px; display: flex; align-items: center; gap: 3px; }
.spif-tick-line { width: 5px; height: 1px; background: #CCC; }
.spif-tick-lbl { font-family: 'DM Mono', monospace; font-size: 8px; color: #BBB; }
.spif-timeline { width: 100%; margin-top: 12px; border-top: 1px solid #E2DFD8; padding-top: 10px; }
.spif-tl-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 2px; }
.spif-tl-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
.spif-tl-dot { width: 6px; height: 6px; border-radius: 50%; margin-bottom: 3px; flex-shrink: 0; }
.spif-tl-dot-done { background: #0F6E56; }
.spif-tl-dot-curr { width: 8px; height: 8px; }
.spif-tl-dot-next { background: #D5D2CB; }
.spif-tl-label { font-family: 'DM Mono', monospace; font-size: 8px; color: #6B6860; line-height: 1; }
.spif-tl-obj { font-family: 'DM Mono', monospace; font-size: 7px; color: #BBB; line-height: 1; margin-top: 2px; }
</style>

<div class="spif-wrap">
  <div class="spif-header">
    <div>
      <h2>SPIF Été 2026 <span class="spif-pbadge" id="spif-periode">—</span> <span class="spif-sbadge" id="spif-semaine">—</span></h2>
    </div>
    <div class="spif-meta" id="spif-date">—</div>
  </div>
  <div class="spif-grid" id="spif-grid"></div>
  <div class="spif-footer" id="spif-footer"></div>
</div>

<script>
// ════════════════════════════════════════════════════
// À METTRE À JOUR CHAQUE LUNDI — 7 valeurs seulement
// ════════════════════════════════════════════════════
var SPIF_CONFIG = {
  periodeActuelle: 'P02',           // ← période en cours
  semaineActuelle: 'S03',           // ← semaine en cours
  periodeNum: 2,                    // ← numéro période (1-7)
  semainesTotalesAccomplies: 5      // ← +1 chaque lundi
};

var SPIF_VENTES = {
  PAB:        1895,   // ← total cumulatif caisses PAB
  SOJU:       1509,   // ← total cumulatif caisses SOJU
  SPIRITUEUX: 3333,   // ← total cumulatif caisses SPIRITUEUX
  VIN:        172     // ← total cumulatif caisses VIN
};
// ════════════════════════════════════════════════════

var SPIF_CATS = [
  { key: 'PAB',        label: 'Prêt à boire<br>hors Labatt', color: '#2E6FD9', obj: 15068 },
  { key: 'SOJU',       label: 'Soju',                        color: '#16A87C', obj: 7608  },
  { key: 'SPIRITUEUX', label: 'Spiritueux',                   color: '#7B5EA7', obj: 17770 },
  { key: 'VIN',        label: 'Vin',                          color: '#C4472A', obj: 2573  }
];
var SPIF_SAISON = {
  PAB:        [10.2, 22.8, 39.8, 59.9, 78.8, 90.6, 100],
  SOJU:       [9.2,  20.8, 36.5, 52.8, 73.4, 87.8, 100],
  SPIRITUEUX: [12.8, 26.3, 40.9, 56.1, 70.9, 85.5, 100],
  VIN:        [13.0, 26.7, 41.2, 56.5, 71.0, 85.5, 100]
};

function spifObjDate(cat, sem) {
  var s = SPIF_SAISON[cat];
  var obj = SPIF_CATS.find(function(c){ return c.key === cat; }).obj;
  var perComplete = Math.floor(sem / 4);
  var semRest = sem % 4;
  var pct;
  if (perComplete === 0) { pct = s[0] * (semRest / 4); }
  else if (perComplete >= 7) { pct = 100; }
  else { pct = s[perComplete-1] + (s[perComplete] - s[perComplete-1]) * (semRest/4); }
  return Math.round(obj * pct / 100);
}

function formatK(n) {
  return n >= 1000 ? (Math.round(n/100)/10)+'k' : n.toString();
}

function spifTimeline(cat, color) {
  var s = SPIF_SAISON[cat];
  var obj = SPIF_CATS.find(function(c){ return c.key === cat; }).obj;
  var currNum = SPIF_CONFIG.periodeNum;
  var periods = ['P01','P02','P03','P04','P05','P06','P07'];
  var perPeriode = [];
  for (var i = 0; i < 7; i++) {
    perPeriode.push(Math.round(obj * (s[i]-(i===0?0:s[i-1])) / 100));
  }
  var html = '<div class="spif-timeline"><div class="spif-tl-row">';
  for (var i = 0; i < 7; i++) {
    var pNum = i+1;
    var isDone = pNum < currNum, isCurr = pNum === currNum;
    var dotStyle = isCurr ? 'background:'+color+';box-shadow:0 0 0 2px rgba(0,0,0,0.1);' : '';
    var dotClass = 'spif-tl-dot '+(isDone?'spif-tl-dot-done':(isCurr?'spif-tl-dot-curr':'spif-tl-dot-next'));
    var lblStyle = isDone?'color:#0F6E56;':(isCurr?'color:'+color+';font-weight:600;':'');
    var objStyle = isCurr?'color:'+color+';opacity:0.85;':'';
    html += '<div class="spif-tl-item">'
      +'<div class="'+dotClass+'" style="'+dotStyle+'"></div>'
      +'<div class="spif-tl-label" style="'+lblStyle+'">'+(isDone?'✓':periods[i])+'</div>'
      +'<div class="spif-tl-obj" style="'+objStyle+'">'+formatK(perPeriode[i])+'</div>'
      +'</div>';
  }
  return html+'</div></div>';
}

function spifCard(cat, ventes) {
  var c = SPIF_CATS.find(function(x){ return x.key===cat; });
  var objFinal = c.obj;
  var objDate = spifObjDate(cat, SPIF_CONFIG.semainesTotalesAccomplies);
  var v = Math.round(ventes);
  var pctFinal = Math.min(100, Math.round(v/objFinal*100));
  var ecart = v - objDate;
  var ratio = objDate > 0 ? v/objDate : 0;
  var badgeClass, badgeTxt;
  if (ratio>=1.10)      { badgeClass='spif-ahead';   badgeTxt='En avance'; }
  else if (ratio>=0.85) { badgeClass='spif-ontrack'; badgeTxt='Dans la cible'; }
  else if (ratio>=0.60) { badgeClass='spif-watch';   badgeTxt='À surveiller'; }
  else                  { badgeClass='spif-behind';  badgeTxt='En retard'; }
  var ecartStr = ecart>=0?'+'+ecart.toLocaleString('fr-CA'):ecart.toLocaleString('fr-CA');
  var ecartColor = ecart>=0?'#0F6E56':'#993C1D';
  var trackH=152, fillPx=Math.round(Math.min(pctFinal,100)/100*trackH);
  var targetBottom = 14+Math.round(Math.min(100,objDate/objFinal*100)/100*trackH);
  var ticks=[0,25,50,75,100].map(function(t){
    return '<div class="spif-tick" style="bottom:'+(14+Math.round(t/100*trackH))+'px"><div class="spif-tick-line"></div><span class="spif-tick-lbl">'+t+'%</span></div>';
  }).join('');
  var perComplete=Math.floor(SPIF_CONFIG.semainesTotalesAccomplies/4);
  var semRest=SPIF_CONFIG.semainesTotalesAccomplies%4;
  var cibleLabel=semRest===0?'Cible fin P0'+perComplete:'Cible '+SPIF_CONFIG.periodeActuelle+'-'+SPIF_CONFIG.semaineActuelle;
  return '<div class="spif-card" style="--spif-accent:'+c.color+'">'
    +'<div class="spif-card-title">'+c.label+'</div>'
    +'<div class="spif-thermo-outer">'+ticks
    +'<div class="spif-thermo-tube"><div class="spif-thermo-fill" style="height:'+fillPx+'px"></div></div>'
    +'<div class="spif-target-line" style="bottom:'+targetBottom+'px"><div class="spif-target-inner"></div><div class="spif-target-lbl">← cible</div></div>'
    +'<div class="spif-bulb"></div></div>'
    +'<div class="spif-pct-big">'+pctFinal+'<span>%</span></div>'
    +'<div class="spif-caisses-reel">'+v.toLocaleString('fr-CA')+' caisses</div>'
    +'<div class="spif-caisses-obj">objectif final : '+objFinal.toLocaleString('fr-CA')+'</div>'
    +'<div class="spif-divider"></div>'
    +'<div class="spif-row"><span class="spif-lbl">'+cibleLabel+'</span><span class="spif-val">'+objDate.toLocaleString('fr-CA')+'</span></div>'
    +'<div class="spif-row"><span class="spif-lbl">Écart vs cible</span><span class="spif-val" style="color:'+ecartColor+'">'+ecartStr+' caisses</span></div>'
    +'<div class="spif-row" style="margin-top:8px;justify-content:center"><span class="spif-badge '+badgeClass+'">'+badgeTxt+'</span></div>'
    +spifTimeline(cat, c.color)+'</div>';
}

document.getElementById('spif-periode').textContent = SPIF_CONFIG.periodeActuelle;
document.getElementById('spif-semaine').textContent = SPIF_CONFIG.semaineActuelle;
document.getElementById('spif-date').textContent = new Date().toLocaleDateString('fr-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('spif-grid').innerHTML = SPIF_CATS.map(function(c){ return spifCard(c.key, SPIF_VENTES[c.key]); }).join('');
document.getElementById('spif-footer').textContent = 'Semaines accomplies : '+SPIF_CONFIG.semainesTotalesAccomplies+'/28 · Données cumulatives depuis P01';
</script>
